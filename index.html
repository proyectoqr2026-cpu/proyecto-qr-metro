<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Mascotas</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YV98SYCLSV"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-YV98SYCLSV');
</script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #ffcc00;
  color: black;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* FILTROS */
.filtros {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.filtros button {
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #ddd;
  cursor: pointer;
  font-weight: bold;
}

.filtros button:hover {
  background: #e60023;
  color: white;
}

/* GRID */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: 0.2s;
  position: relative; /* 🔥 NECESARIO */
}

.badge {
  position: absolute;
  background: red;
  color: white;
  padding: 4px 8px;
  font-size: 12px;
  top: 10px;
  left: 10px;
  border-radius: 5px;
  font-weight: bold;
  animation: parpadeo 2s infinite;
}

@keyframes parpadeo {
  0% {opacity: 1;}
  50% {opacity: 0.4;}
  100% {opacity: 1;}
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: contain; /* 🔥 mantiene proporción */
  background: white;
}

@media (max-width: 600px) {
  .card img {
    height: 140px;
  }
}

/* INFO */
.info {
  padding: 10px;
  min-height: 100px;
}

/* 🔥 SOLUCIÓN 3 APLICADA */
.nombre {
  font-size: 14px;
  height: 40px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* PRECIOS */
.precio, .oferta {
  display: block;
}

.precio {
  text-decoration: line-through;
  color: gray;
  font-size: 13px;
}

.oferta {
  background: yellow;
  color: #d32f2f;
  font-size: 26px;
  font-weight: 900;
  text-align: center;
  padding: 5px;
  border-radius: 5px;
}

.ahorro {
  color: green;
  font-size: 13px;
  font-weight: bold;
}

@media (max-width: 600px) {
  .contenedor {
    grid-template-columns: repeat(2, 1fr);
  }

  .card img {
    height: 140px;
  }
}

</style>
</head>

<body>

<header>🔥 Ofertas en Mascotas - Solo en esta sección</header>

<div style="text-align:center; padding:5px; font-size:14px;">
Escanea y aprovecha las ofertas disponibles aquí 🛒
</div>

<div class="filtros">
  <button onclick="filtrar('Todos')">Todos</button>
  <button onclick="filtrar('Perro')">🐶 Perros</button>
  <button onclick="filtrar('Gato')">🐱 Gatos</button>
  <button onclick="filtrar('Cupon')">🎟️ Descuentos Exclusivos QR</button>
  </div>

<div id="contenedor" class="contenedor"></div>

<script>
let productos = [];

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhfjNlGyCmtNqkuuzX1HjsJ_rBf-y60br1caZHflA39GWLUDs9YccO9V7sAm7wz8v69UGFmlqTo8ja/pub?gid=1199321115&single=true&output=csv";

// 🔥 CARGAR PRODUCTOS
function cargarProductos() {
  fetch(URL)
  .then(res => res.text())
  .then(csv => {

    Papa.parse(csv, {
      header: true,
      skipEmptyLines: true,
      complete: function(results) {

        productos = results.data.map(p => ({
          nombre: (p.nombre || "").trim(),
          precio: (p.precio || "0").trim(),
          oferta: (p.oferta || "0").trim(),
          imagen: (p.imagen && p.imagen.startsWith("http")) ? p.imagen : "https://via.placeholder.com/300",
          categoria: (p.categoria || "").trim(),
          estado: (p.estado || "SI").toUpperCase().trim(),
          fecha_fin: (p.fecha_fin || "").trim(),
          cupon: (p.cupon || "NO").toUpperCase().trim(),
          codigo: (p.codigo || "").toString().trim()
        }))
        .filter(p => p.estado === "SI");

        render(productos);
      }
    });

  })
  .catch(err => console.error("Error en fetch:", err));
}

// 🎯 RENDER
function render(lista) {
  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  lista.forEach((p, index) => {

     const nombreSeguro = encodeURIComponent(p.nombre);
    
    let botonCupon = "";
let cuponHTML = "";

if (
  (p.cupon || "").toString().trim().toUpperCase() === "SI" &&
  (p.codigo || "").toString().trim() !== ""
) {

  let imagenBarcode = "";

  if (p.codigo.startsWith("http")) {
    imagenBarcode = `<img src="${p.codigo}" width="180">`;
  } else {
    imagenBarcode = `<img src="https://barcode.tec-it.com/barcode.ashx?data=${p.codigo}&code=Code128" width="180">`;
  }

  botonCupon = `<button onclick="mostrarCupon('${index}'); gtag('event','ver_cupon',{producto:'${nombreSeguro}'})" style="margin-top:8px; padding:6px; background:#e60023; color:white; border:none; border-radius:5px;">Ver cupón</button>`;

  cuponHTML = `
    <div id="cupon-${index}" style="display:none; margin-top:10px;">
    ${imagenBarcode}
    <p style="font-size:12px;">Muestra este código en caja</p>
  </div>
  `;
}

let precio = parseFloat((p.precio || "0").replace(",", ".")) || 0;
  let oferta = parseFloat((p.oferta || "0").replace(",", ".")) || 0;

  let ahorro = (precio > oferta) ? (precio - oferta) : 0;

  let ahorroHTML = (ahorro > 0)
    ? `<div class="ahorro">💸 Ahorras S/ ${ahorro.toFixed(2)}</div>`
    : '';

  let badge = (precio > oferta)
    ? '<div class="badge">OFERTA</div>'
    : '';

  let imagen = (p.imagen && p.imagen.startsWith("http"))
    ? p.imagen
    : "https://via.placeholder.com/300";

  contenedor.innerHTML += `
    <div class="card">
      ${badge}
      <img src="${imagen}" loading="lazy">
      <div class="info">
        <div class="nombre">${p.nombre}</div>
        <div class="precio">S/ ${precio.toFixed(2)}</div>
        <div class="oferta">S/ ${oferta.toFixed(2)}</div>
        ${ahorroHTML}
        ${botonCupon}
        ${cuponHTML}
      </div>
    </div>
  `;
});
}


function filtrar(cat) {
  if (cat === "Todos") {
    render(productos);
  } else if (cat === "Cupon") {
    render(productos.filter(p => p.cupon === "SI"));
  } else {
    render(productos.filter(p =>
      (p.categoria || "").toLowerCase().trim() === cat.toLowerCase()
    ));
  }
}

 // 🚀 CARGA INICIAL
cargarProductos();

// 🔄 ACTUALIZACIÓN AUTOMÁTICA (3 minutos)
setInterval(() => {
  cargarProductos();
}, 180000); // 3 minutos

function mostrarCupon(id) {
  let el = document.getElementById("cupon-" + id);

  if (!el) return;

  el.style.display = (el.style.display === "none") ? "block" : "none";
}
</script>

</body>
</html>
