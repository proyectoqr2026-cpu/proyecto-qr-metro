<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Mascotas</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YV98SYCLSV"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-YV98SYCLSV');
</script>

<style>
  
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* 🔥 HERO (AGREGAR AQUÍ) */
.hero {
  background: linear-gradient(90deg, #ffcc00, #ff9900);
  padding: 22px 10px;
  text-align: center;
}

.hero-content {
  max-width: 400px;
  margin: auto;
}
  
.hero h1 {
  margin: 0;
  font-size: 24px;
  font-weight: 800;
}

.hero p {
  margin: 5px 0;
  font-size: 14px;
}

.badge-qr {
  display: inline-block;
  margin-top: 8px;
  background: #e60023;
  color: white;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}


/* FILTROS */
.filtros {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.filtros button {
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #ddd;
  cursor: pointer;
  font-weight: bold;
}

.filtros button:hover {
  background: #e60023;
  color: white;
}

/* GRID */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  position: relative;
  transition: transform 0.25s ease, box-shadow 0.25s ease;

  will-change: transform;
}

.badge {
  position: absolute;
  background: red;
  color: white;
  padding: 4px 8px;
  font-size: 12px;
  top: 10px;
  left: 10px;
  border-radius: 5px;
  font-weight: bold;
  animation: parpadeo 1.5s infinite;
}

@keyframes parpadeo {
  0% {opacity: 1;}
  50% {opacity: 0.4;}
  100% {opacity: 1;}
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  background: #fff;
  padding: 10px;
}

  /* 🔥 NUEVO: contenedor de código de barras */
.barcode-box {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

/* 🔥 NUEVO: imagen del código */
.barcode-box img {
  width: 100%;
  max-width: 220px;
  height: auto;
}

/* INFO */
.info {
  padding: 10px;
  min-height: 100px;
}

/* 🔥 SOLUCIÓN 3 APLICADA */
.nombre {
  font-size: 14px;
  min-height: 60px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

/* PRECIOS */
.precio, .oferta {
  display: block;
}

.precio {
  text-decoration: line-through;
  color: gray;
  font-size: 13px;
}

.oferta {
  background: yellow;
  color: #d32f2f;
  font-size: 26px;
  font-weight: 900;
  text-align: center;
  padding: 5px;
  border-radius: 5px;
}
.btn-cupon {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  background: #e60023;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-cupon:hover {
  background: #b8001c;
  transform: scale(1.02);
}
  .btn-cupon:active {
  transform: scale(0.95);
}
  
.ahorro {
  color: green;
  font-size: 13px;
  font-weight: bold;
}

@media (max-width: 600px) {
  .contenedor {
    grid-template-columns: repeat(2, 1fr);
  }

  /* 🔥 NUEVO: categorías tipo app */
  .filtros {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 10px;
    white-space: nowrap;
  }

  .filtros::-webkit-scrollbar {
    display: none;
  }

  .filtros button {
    flex: 0 0 auto;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 20px;
  }
  
/* 🔥 NUEVO: optimización del nombre en móvil */
  .nombre {
  -webkit-line-clamp: 3;
  min-height: 55px;
}
}
</style>
</head>

<body>

<header class="hero">
  <div class="hero-content">
    <h1>🔥 Ofertas Exclusivas 🐶🐱</h1>
    <p>Escanea y usa tu cupón en caja para ahorrar hoy</p>
    <span class="badge-qr">EXCLUSIVO QR</span>
  </div>
</header>

<div class="filtros">
  <button onclick="filtrar('Todos')">Todos</button>
  <button onclick="filtrar('Perro')">🐶 Perros</button>
  <button onclick="filtrar('Gato')">🐱 Gatos</button>
  <button onclick="filtrar('Cupon')">🎟️ Descuentos Exclusivos QR</button>
  </div>

<div id="contenedor" class="contenedor"></div>

<script>
let productos = [];

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhfjNlGyCmtNqkuuzX1HjsJ_rBf-y60br1caZHflA39GWLUDs9YccO9V7sAm7wz8v69UGFmlqTo8ja/pub?gid=1199321115&single=true&output=csv";

// 🔥 CARGAR PRODUCTOS
function cargarProductos() {
  fetch(URL)
  .then(res => res.text())
  .then(csv => {

    Papa.parse(csv, {
      header: true,
      skipEmptyLines: true,
      complete: function(results) {

        productos = results.data.map(p => ({
          nombre: (p.nombre || "").trim(),
          precio: (p.precio || "0").trim(),
          oferta: (p.oferta || "0").trim(),
          imagen: (p.imagen && p.imagen.startsWith("http")) ? p.imagen : "https://via.placeholder.com/300",
          categoria: (p.categoria || "").trim(),
          estado: (p.estado || "SI").toUpperCase().trim(),
          fecha_fin: (p.fecha_fin || "").trim(),
          cupon: (p.cupon || "NO").toUpperCase().trim(),
          codigo: (p.codigo || "").toString().trim()
        }))
        .filter(p => p.estado === "SI");

        render(productos);
      }
    });

  })
  .catch(err => console.error("Error en fetch:", err));
}

// 🎯 RENDER MEJORADO (CON MARKETING)
function render(lista) {
  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  // 🔥 NUEVO: ordenar por mayor descuento
  lista.sort((a, b) => (b.oferta - a.oferta));

  lista.forEach((p, index) => {

    let botonCupon = "";
    let cuponHTML = "";

    if (
      (p.cupon || "").toString().trim().toUpperCase() === "SI" &&
      (p.codigo || "").toString().trim() !== ""
    ) {

      let imagenBarcode = "";

     // 🔥 SOLUCIÓN FINAL: SIEMPRE MISMO DISEÑO (centrado + responsive)
let urlBarcode = p.codigo.startsWith("http")
  ? p.codigo
  : `https://barcode.tec-it.com/barcode.ashx?data=${p.codigo}&code=Code128`;

imagenBarcode = `
  <div class="barcode-box">
    <img src="${urlBarcode}">
  </div>
`;

      // 🔥 CAMBIO: botón más vendedor
      botonCupon = `<button class="btn-cupon" data-index="${index}" data-producto="${p.nombre.replace(/"/g, '&quot;')}">
      🔥 Obtener descuento
      </button>`;

      cuponHTML = `
        <div id="cupon-${index}" style="display:none; margin-top:10px;">
        ${imagenBarcode}
        <p style="font-size:12px;">Muestra este código en caja</p>
      </div>
      `;
    }

    let precio = parseFloat((p.precio || "0").replace(",", ".")) || 0;
    let oferta = parseFloat((p.oferta || "0").replace(",", ".")) || 0;

    let ahorro = (precio > oferta) ? (precio - oferta) : 0;

    // 🔥 CAMBIO: texto más emocional
    let ahorroHTML = (ahorro > 0)
      ? `<div class="ahorro">💸 Te ahorras S/ ${ahorro.toFixed(2)}</div>`
      : '';

    // 🔥 NUEVO: cálculo de porcentaje
    let descuento = (precio > 0)
      ? Math.round(((precio - oferta) / precio) * 100)
      : 0;

    // 🔥 CAMBIO: badge con % (más vendedor)
    let badge = (precio > oferta)
      ? `<div class="badge">🔥 -${descuento}%</div>`
      : '';

    let imagen = (p.imagen && p.imagen.startsWith("http"))
      ? p.imagen
      : "https://via.placeholder.com/300";

    // 🔥 NUEVO: urgencia
    // let urgenciaHTML = `<div style="font-size:11px; color:red;">
    // ⏰ Solo por hoy
    // </div>`;

    // 🔥 NUEVO: prueba social
    // let socialHTML = `<div style="font-size:11px; color:#555;">
    // 🔥 Alta demanda
    // </div>`;

    // 🔥 NUEVO: confianza
    let confianzaHTML = `<div style="font-size:10px; color:#777;">
    ✔ Válido en tienda
    </div>`;

    contenedor.innerHTML += `
      <div class="card">
        ${badge}
        <img src="${imagen}" loading="lazy">
        <div class="info">
          <div class="nombre" title="${p.nombre}">${p.nombre}</div>
          <div class="precio">S/ ${precio.toFixed(2)}</div>
          <div class="oferta">S/ ${oferta.toFixed(2)}</div>

          ${ahorroHTML}
                   

          ${botonCupon}
          ${confianzaHTML}
          ${cuponHTML}
        </div>
      </div>
    `;
  });
}


function filtrar(cat) {
  if (cat === "Todos") {
    render(productos);
  } else if (cat === "Cupon") {
    render(productos.filter(p => p.cupon === "SI"));
  } else {
    render(productos.filter(p =>
      (p.categoria || "").toLowerCase().trim() === cat.toLowerCase()
    ));
  }
}

 // 🚀 CARGA INICIAL
cargarProductos();

// 🔄 ACTUALIZACIÓN AUTOMÁTICA (3 minutos)
setInterval(() => {
  cargarProductos();
}, 180000); // 3 minutos

function mostrarCupon(id) {
  let el = document.getElementById("cupon-" + id);

  if (!el) return;

  el.style.display = (el.style.display === "none") ? "block" : "none";
}

 document.addEventListener("click", function(e) {
  if (e.target.classList.contains("btn-cupon")) {

    const index = e.target.getAttribute("data-index");
    const producto = e.target.getAttribute("data-producto");

    mostrarCupon(index);

    gtag('event','ver_cupon',{
      producto: producto
    });
  }
});  
</script>

</body>
</html>
